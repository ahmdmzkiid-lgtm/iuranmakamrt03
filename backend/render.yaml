services:
  - type: web
    name: api-iuran-rt
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: iuran-rt-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: iuran-rt-db
    databaseName: iuran_rt
    user: iuran_rt_user
